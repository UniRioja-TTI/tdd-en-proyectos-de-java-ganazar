name: Ejecutar Tests y Actualizar Early

on:
  push:
    branches:
      - main  # Se activa al subir a main

jobs:
  test-and-promote:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Necesario para poder movernos entre ramas

      - name: Configurar Java 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Ejecutar Tests con Maven
        run: mvn test  # Aquí es donde se comprueba que todo esté verde

      # Solo si los tests de arriba funcionan, se ejecuta este paso:
      - name: Actualizar rama Early
        if: success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout early
          git merge main --ff-only
          git push origin early
